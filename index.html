<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Service Laptop PRO</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <img src="assets/logo.png" class="logo" alt="Logo" />
  <h2>Sistem Service Laptop PRO</h2>
  <p>Admin Panel</p>
</div>

<!-- FORM INPUT -->
<div class="card">
  <h3>Input Service</h3>

  <input id="nama" placeholder="Nama pelanggan" />
  <input id="hp" placeholder="No HP" />
  <input id="kerusakan" placeholder="Kerusakan" />
  <input type="date" id="tglMasuk" />

  <h4>Item Service</h4>
  <div id="items"></div>
  <button onclick="addItem()">+ Tambah Item</button>

  <input id="diskon" type="number" placeholder="Diskon" />
  <input id="dp" type="number" placeholder="DP" />

  <button onclick="saveData()">Simpan Service</button>
</div>

<!-- DATA LIST -->
<div class="card">
  <h3>Data Service Masuk</h3>
  <div id="list"></div>
</div>

</div>

<script src="js/app.js"></script>

</body>
</html>

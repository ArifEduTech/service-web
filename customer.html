<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cek Status Service</title>
<link rel="stylesheet" href="css/style.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="container">

<div class="header">
  <img src="assets/logo.png" class="logo" alt="Logo" />
  <h2>Cek Status Service</h2>
  <p>Customer Panel</p>
</div>

<div class="card" id="result">
  Loading data...
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

let data = JSON.parse(localStorage.getItem('service_laptop')) || [];

const item = data.find(d => d.id == id);

function render() {
  const el = document.getElementById('result');

  if (!item) {
    el.innerHTML = "<h3>Data tidak ditemukan</h3>";
    return;
  }

  let total = item.items.reduce((s, i) => s + (i.qty * i.harga), 0);

  el.innerHTML = `
    <h3>${item.nama}</h3>
    <p><b>HP:</b> ${item.hp}</p>
    <p><b>Kerusakan:</b> ${item.kerusakan}</p>
    <p><b>Status:</b> ${item.status}</p>
    <p><b>Tanggal Masuk:</b> ${item.tglMasuk}</p>
    <p><b>Tanggal Keluar:</b> ${item.tglKeluar || '-'}</p>

    <hr>

    <h4>Detail Service</h4>
    ${item.items.map(i => `<p>${i.qty} x ${i.desc} = Rp ${i.qty * i.harga}</p>`).join('')}

    <hr>

    <p><b>Total:</b> Rp ${total}</p>
    <p><b>Diskon:</b> Rp ${item.diskon}</p>
    <p><b>DP:</b> Rp ${item.dp}</p>

    <h3>STATUS: ${item.status}</h3>

    <div id="qrcode"></div>
    <p class="small">Scan QR untuk akses cepat</p>
  `;

  new QRCode(document.getElementById("qrcode"), window.location.href);
}

render();
</script>

</body>
</html>
